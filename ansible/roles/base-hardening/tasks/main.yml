---
# CIS Level 1 Hardening Tasks
# Reference: CIS Amazon Linux 2023 Benchmark v1.0

# === SSH Hardening ===
- name: Configure SSH hardening
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
    validate: /usr/sbin/sshd -t -f %s
  loop:
    - { regexp: "^PermitRootLogin",     line: "PermitRootLogin no" }
    - { regexp: "^PasswordAuthentication", line: "PasswordAuthentication no" }
    - { regexp: "^X11Forwarding",       line: "X11Forwarding no" }
    - { regexp: "^MaxAuthTries",        line: "MaxAuthTries 3" }
    - { regexp: "^LoginGraceTime",      line: "LoginGraceTime 60" }
    - { regexp: "^ClientAliveInterval", line: "ClientAliveInterval 300" }
    - { regexp: "^ClientAliveCountMax", line: "ClientAliveCountMax 0" }
    - { regexp: "^PermitEmptyPasswords", line: "PermitEmptyPasswords no" }
    - { regexp: "^Protocol",            line: "Protocol 2" }
  notify: Restart SSH
  tags: [ssh, cis-5.2]

# === Network Hardening ===
- name: Apply network kernel parameters (CIS 3.x)
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    reload: true
  loop:
    - { name: net.ipv4.ip_forward,                        value: "0" }
    - { name: net.ipv4.conf.all.send_redirects,           value: "0" }
    - { name: net.ipv4.conf.default.send_redirects,       value: "0" }
    - { name: net.ipv4.conf.all.accept_source_route,      value: "0" }
    - { name: net.ipv4.conf.all.log_martians,             value: "1" }
    - { name: net.ipv4.conf.all.rp_filter,                value: "1" }
    - { name: net.ipv4.tcp_syncookies,                    value: "1" }
    - { name: kernel.randomize_va_space,                  value: "2" }
  tags: [network, cis-3]

# === Password Policy ===
- name: Configure password complexity
  ansible.builtin.lineinfile:
    path: /etc/security/pwquality.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
  loop:
    - { regexp: "^minlen",   line: "minlen = 14" }
    - { regexp: "^dcredit",  line: "dcredit = -1" }
    - { regexp: "^ucredit",  line: "ucredit = -1" }
    - { regexp: "^ocredit",  line: "ocredit = -1" }
    - { regexp: "^lcredit",  line: "lcredit = -1" }
  tags: [password, cis-5.4]

# === Filesystem Security ===
- name: Disable unused filesystems
  ansible.builtin.copy:
    content: "install {{ item }} /bin/true\n"
    dest: "/etc/modprobe.d/{{ item }}.conf"
    mode: "0644"
  loop: [cramfs, freevxfs, jffs2, hfs, hfsplus, squashfs, udf]
  tags: [filesystem, cis-1.1]

# === Auditd Setup ===
- name: Install and configure auditd
  ansible.builtin.yum:
    name: audit
    state: present
  tags: [audit, cis-4]

- name: Enable auditd service
  ansible.builtin.systemd:
    name: auditd
    state: started
    enabled: true
  tags: [audit, cis-4]

# === Remove unnecessary packages ===
- name: Remove insecure and unnecessary packages
  ansible.builtin.yum:
    name: "{{ item }}"
    state: absent
  loop:
    - telnet
    - telnet-server
    - rsh
    - rsh-server
    - ypbind
    - ypserv
    - tftp
    - tftp-server
  ignore_errors: true
  tags: [packages, cis-2]
