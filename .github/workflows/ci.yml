name: CI — Golden Image Pipeline Validation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Pipeline Configuration
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          # Install Ansible
          pip install ansible ansible-lint
          
          # Install Packer
          curl -fsSL https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt-get update && sudo apt-get install packer terraform -y

      - name: Ansible Lint
        run: |
          ansible-lint ansible/site.yml \
            --exclude=ansible/roles/base-hardening/tasks/main.yml \
            || true
          echo "✅ Ansible lint complete"

      - name: Packer Validate (syntax only)
        run: |
          cd packer/
          packer init .
          packer validate \
            -var "region=ap-south-1" \
            -var "base_ami=ami-00000000000000000" \
            golden-image.pkr.hcl || true
          echo "✅ Packer validation complete"

      - name: Terraform Validate
        run: |
          cd terraform/
          terraform init -backend=false
          terraform validate
          echo "✅ Terraform validation complete"

      - name: Security Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret,misconfig
          format: table
          exit-code: 0

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: scripts/

  security-scan:
    name: Security Validation
    runs-on: ubuntu-latest
    needs: validate
    
    steps:
      - uses: actions/checkout@v4

      - name: Scan for secrets with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkov IaC scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          output_format: cli
          soft_fail: true
